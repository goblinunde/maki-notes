name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  models: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build TeX documents
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            document2.tex
            example.tex
            beamer-demo.tex
            tikz-template-pages.tex
            tikz-example.tex
            smoke-packaging.tex
            tests/test-basic.tex
            tests/test-beamer.tex
            tests/test-environments.tex
            tests/test-graphics.tex
            tests/test-tikz-styles.tex
            tests/test-wrap-layout.tex
            tests/test-workflow-guide.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -file-line-error -halt-on-error

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          mkdir -p dist/package/maki-notes

          cp README.md Makefile latexmkrc dist/package/maki-notes/
          cp ./*.cls ./*.sty ./*.tex dist/package/maki-notes/
          cp -R beamer-example dist/package/maki-notes/beamer-example
          cp -R docs dist/package/maki-notes/docs
          cp -R tests dist/package/maki-notes/tests

          tar -czf "dist/maki-notes-${tag}-source.tar.gz" -C dist/package maki-notes

          cp document2.pdf "dist/maki-notes-${tag}-manual.pdf"
          cp example.pdf "dist/maki-notes-${tag}-example.pdf"
          cp beamer-demo.pdf "dist/maki-notes-${tag}-beamer-demo.pdf"
          cp tikz-template-pages.pdf "dist/maki-notes-${tag}-tikz-templates.pdf"
          cp tikz-example.pdf "dist/maki-notes-${tag}-tikz-example.pdf"

      - name: Generate AI release notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-v:refname | grep -Fxv "$tag" | head -n 1 || true)"

          if [ -n "$previous_tag" ]; then
            git log --pretty=format:'- %s (%h)' "${previous_tag}..HEAD" > dist/commit-log.md
          else
            git log --pretty=format:'- %s (%h)' HEAD > dist/commit-log.md
          fi

          if [ ! -s dist/commit-log.md ]; then
            echo "- Initial release" > dist/commit-log.md
          fi

          if response="$(
            jq -n \
              --arg model "openai/gpt-5" \
              --arg repository "$REPOSITORY" \
              --arg tag "$tag" \
              --arg previous_tag "$previous_tag" \
              --rawfile commits dist/commit-log.md \
              '{
                model: $model,
                messages: [
                  {
                    role: "system",
                    content: "You write GitHub release notes for a LaTeX template repository. Reply in Chinese. Use markdown. Keep it concise but useful. Include: 本次版本概览, 主要变化, 使用建议."
                  },
                  {
                    role: "user",
                    content: (
                      "Repository: " + $repository + "\n" +
                      "Current tag: " + $tag + "\n" +
                      "Previous tag: " + (if $previous_tag == "" then "none" else $previous_tag end) + "\n\n" +
                      "Commit summary:\n" + $commits
                    )
                  }
                ]
              }' | \
            curl -sS -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              -H "Content-Type: application/json" \
              https://models.github.ai/inference/chat/completions \
              -d @-
          )"; then
            notes="$(
              printf '%s' "$response" | jq -r '
                .choices[0].message.content
                | if type == "string" then .
                  elif type == "array" then map(.text // .content // "") | join("\n")
                  else empty
                  end
              '
            )"
          else
            notes=""
          fi

          if [ -z "${notes:-}" ] || [ "$notes" = "null" ]; then
            {
              echo "## ${tag}"
              echo
              echo "### 提交摘要"
              cat dist/commit-log.md
            } > dist/release-notes.md
          else
            printf '%s\n' "$notes" > dist/release-notes.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/*.tar.gz
            dist/*.pdf
