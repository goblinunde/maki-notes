name: Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build TeX tests
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            smoke-packaging.tex
            tests/test-basic.tex
            tests/test-beamer.tex
            tests/test-environments.tex
            tests/test-graphics.tex
            tests/test-tikz-styles.tex
            tests/test-wrap-layout.tex
            tests/test-workflow-guide.tex
            tests/test-research-workflow.tex
            tests/test-solutions-inline.tex
            tests/test-solutions-appendix.tex
            tests/test-reference-helpers.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -file-line-error -halt-on-error
