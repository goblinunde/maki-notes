name: Issue Model Comment

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write
  models: read

jobs:
  comment:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest

    steps:
      - name: Generate issue summary with GitHub Models
        id: model
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          set -euo pipefail

          response="$(
            jq -n \
              --arg model "openai/gpt-5" \
              --arg title "$ISSUE_TITLE" \
              --arg body "${ISSUE_BODY:-}" \
              --arg author "$ISSUE_AUTHOR" \
              '{
                model: $model,
                messages: [
                  {
                    role: "system",
                    content: "You summarize GitHub issues for maintainers. Reply in Chinese. Keep it concise. Use markdown. Include: 1) 问题概述 2) 需要确认的信息 3) 建议下一步."
                  },
                  {
                    role: "user",
                    content: ("Issue author: " + $author + "\n\nTitle:\n" + $title + "\n\nBody:\n" + $body)
                  }
                ]
              }' | \
            curl -sS -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              -H "Content-Type: application/json" \
              https://models.github.ai/inference/chat/completions \
              -d @-
          )"

          comment="$(
            printf '%s' "$response" | jq -r '
              .choices[0].message.content
              | if type == "string" then .
                elif type == "array" then map(.text // .content // "") | join("\n")
                else empty
                end
            '
          )"

          if [ -z "${comment:-}" ] || [ "$comment" = "null" ]; then
            comment="## 问题概述

未能生成 AI 摘要，请手动查看 issue 内容。"
          fi

          {
            echo "comment<<EOF"
            echo "$comment"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update issue comment
        uses: actions/github-script@v7
        env:
          MODEL_COMMENT: ${{ steps.model.outputs.comment }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- github-models:issue-summary -->';
            const body = [
              marker,
              '## AI Issue Summary',
              '',
              process.env.MODEL_COMMENT,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
